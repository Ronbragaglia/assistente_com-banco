# Pre-commit hooks configuration for OpenAI Database Assistant
# See https://pre-commit.com for more information

# Minimum version of pre-commit required
minimum_pre_commit_version: "3.3.0"

# Default language version
default_language_version:
  python: python3.9

# Configuration for CI
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false

# Repositories and hooks
repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        description: This hook trims trailing whitespace.
        types: [text]
      - id: end-of-file-fixer
        name: Fix End of Files
        description: Ensures that a file is either empty or ends with one newline.
        types: [text]
      - id: check-yaml
        name: Check YAML
        description: This hook checks yaml files for parseable syntax.
        types: [yaml]
      - id: check-added-large-files
        name: Check for Added Large Files
        description: Prevent giant files from being committed.
        entry: check-added-large-files --maxkb=1000
      - id: check-json
        name: Check JSON
        description: This hook checks json files for parseable syntax.
        types: [json]
      - id: check-toml
        name: Check TOML
        description: This hook checks toml files for parseable syntax.
        types: [toml]
      - id: check-merge-conflict
        name: Check for Merge Conflicts
        description: Check for files that contain merge conflict strings.
        types: [text]
      - id: check-case-conflict
        name: Check for Case Conflicts
        description: Check for files that would conflict in case-insensitive filesystems.
      - id: detect-private-key
        name: Detect Private Key
        description: Detects the presence of private keys.
        types: [text]
      - id: mixed-line-ending
        name: Mixed Line Ending
        description: Replaces or checks mixed line ending.
        args: ['--fix=lf']
      - id: debug-statements
        name: Check Debug Statements
        description: Check for debugger imports and py37+ breakpoint() calls in python source.
        types: [python]
      - id: check-ast
        name: Check Python AST
        description: Simply check whether the files parse as valid python.
        types: [python]

  # Python code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: Format with Black
        language_version: python3.9
        args: ['--line-length=100']

  # Import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Imports with isort
        args: ['--profile=black', '--line-length=100']

  # Linting with flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint with flake8
        args: [
          '--max-line-length=100',
          '--extend-ignore=E203,E501,W503',
          '--max-complexity=10',
        ]
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-simplify

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Type Check with mypy
        args: ['--ignore-missing-imports']
        additional_dependencies:
          - pydantic>=2.0.0
          - types-requests
        exclude: ^(tests/|examples/)

  # Security checks with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Security Check with bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']

  # Check for common security issues
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect Secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  # Check for spelling mistakes
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        name: Check for Spelling Mistakes
        args: ['--ignore-words-list', 'crate,nd,hass,fo']

  # Check for dead code
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.10
    hooks:
      - id: vulture
        name: Check for Dead Code
        args: ['--min-confidence', '70']
        exclude: ^(tests/|examples/)

  # Check for outdated dependencies
  - repo: https://github.com/pycqa/pip-audit
    rev: v2.6.2
    hooks:
      - id: pip-audit
        name: Check for Vulnerable Dependencies
        args: ['--strict']

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfile
        args: ['--ignore', 'DL3008', '--ignore', 'DL3013']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        name: Lint Markdown Files
        args: ['--fix']

  # YAML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.12.0
    hooks:
      - id: pretty-format-yaml
        name: Format YAML Files
        args: ['--autofix', '--indent', '2']

  # TOML formatting
      - id: pretty-format-toml
        name: Format TOML Files
        args: ['--autofix', '--indent', '2']

  # Check for copyright notices
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: check-json-5
      - id: check-toml-5
